name: Daily Rate Scraper

on:
  schedule:
    # Run every 6 hours: 2 AM, 8 AM, 2 PM, 8 PM UTC
    # (9 PM, 3 AM, 9 AM, 3 PM ET)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            https://ohioratewatch.com/api/cron/daily-check \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          echo "Response code: $response"
          if [ "$response" != "200" ]; then
            echo "Failed to trigger scraper"
            exit 1
          fi
          echo "Scraper triggered successfully"
